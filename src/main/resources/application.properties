spring.application.name=engine

# Server Configuration (Render and other hosts inject PORT; fallback 8080 for local)
server.port=${PORT:8080}

# --- Supabase Production Configuration (AUTHENTIC) ---
spring.datasource.url=${SPRING_DATASOURCE_URL}?sslmode=require&prepareThreshold=0&preparedStatementCacheQueries=0&preferQueryMode=simple
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Database Initialization (Auto-run schema.sql on start)
spring.sql.init.mode=always

# Socket Server properties
socket.server.port=9090

# JWT properties
jwt.secret=${JWT_SECRET:jshdghnkorthdfvcjkdhtfhhiorgjydt}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Optional: Disable hibernate/JPA if any transitive dependencies bring it in
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
