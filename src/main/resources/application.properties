spring.application.name=engine

# Server Configuration (Render and other hosts inject PORT; fallback 8080 for local)
server.port=${PORT:8080}

# --- Database Configuration ---
# Production: set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD, and optionally SPRING_DATASOURCE_DRIVER.
# Local fallback: H2 in PostgreSQL compatibility mode.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:engine;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Database Initialization (Auto-run schema.sql on start)
spring.sql.init.mode=always

# Socket Server properties
socket.server.enabled=${SOCKET_SERVER_ENABLED:false}
socket.server.port=${SOCKET_PORT:9090}

# JWT properties
jwt.secret=${JWT_SECRET:jshdghnkorthdfvcjkdhtfhhiorgjydt}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Email Notification Configuration
spring.mail.host=${MAIL_HOST:${SMTP_SERVER:smtp.example.com}}
spring.mail.port=${MAIL_PORT:${SMTP_PORT:587}}
spring.mail.username=${MAIL_USERNAME:${EMAIL_SENDER:}}
spring.mail.password=${MAIL_PASSWORD:${EMAIL_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.default-encoding=UTF-8
app.base.url=${APP_BASE_URL:http://localhost:8080}

google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/oauth2/callback/google}
frontend.base.url=${FRONTEND_BASE_URL:http://localhost:8000}

# Optional: Disable hibernate/JPA if any transitive dependencies bring it in
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
